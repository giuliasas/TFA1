<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avventura con Spirit 🐎</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f0e6;
  text-align: center;
  margin: 0;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1 {
  margin-bottom: 10px;
  color: #5b3418;
}

.progress {
  font-weight: bold;
  margin-bottom: 15px;
}

.question {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 20px;
}

.answers {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

.answer {
  background: white;
  border-radius: 15px;
  border: 3px solid transparent;
  padding: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.answer:hover {
  border-color: #c98b2c;
  background-color: #fff7e8;
}

.answer img {
  width: 100%;
  height: 160px;
  object-fit: contain;
  border-radius: 10px;
}

.label {
  margin-top: 8px;
  font-weight: bold;
  font-size: 18px;
}

.letter {
  font-weight: bold;
  font-size: 18px;
  color: #c98b2c;
}

.nav {
  margin-top: 25px;
}

button {
  padding: 12px 22px;
  margin: 5px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  background: #c98b2c;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #a96f1f;
}

button:disabled {
  background: #ccc;
}
</style>
</head>

<body>

<div class="container">
  <h1>Avventura con Spirit 🐎</h1>

  <div class="progress" id="progress"></div>

  <div class="question" id="question"></div>
  <div class="answers" id="answers"></div>

  <div class="nav">
    <button id="prevBtn" onclick="prevQuestion()">⬅ Indietro</button>
    <button id="nextBtn" onclick="nextQuestion()">Avanti ➡</button>
  </div>
</div>

<script>
const quiz = [
  {
    q: "Cosa mangia il cavallo?",
    a: [
      { img: "erba.png", label: "ERBA + FIENO" },
      { img: "biscotti.png", label: "BISCOTTI" },
      { img: "carne.png", label: "CARNE" }
    ]
  },
  {
    q: "Il cavallo è...",
    a: [
      { img: "erbivoro.png", label: "ERBIVORO" },
      { img: "carne.png", label: "CARNIVORO" },
      { img: "onnivoro.png", label: "ONNIVORO" }
    ]
  },
  {
    q: "Il cavallo può provare emozioni?",
    a: [
      { img: "si.png", label: "SÌ" },
      { img: "no.png", label: "NO" }
    ]
  }
];

let current = 0;
const letters = ["A", "B", "C", "D"];

function loadQuestion() {
  const questionDiv = document.getElementById("question");
  const answersDiv = document.getElementById("answers");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const progress = document.getElementById("progress");

  // 👉 NUMERO DOMANDA
  progress.innerText = `Domanda ${current + 1} / ${quiz.length}`;

  questionDiv.innerText = quiz[current].q;
  answersDiv.innerHTML = "";

  quiz[current].a.forEach((answer, index) => {
    const card = document.createElement("div");
    card.className = "answer";

    card.innerHTML = `
      <div class="letter">${letters[index]})</div>
      <img src="${answer.img}">
      <div class="label">${answer.label}</div>
    `;

    card.onclick = nextQuestion;
    answersDiv.appendChild(card);
  });

  prevBtn.disabled = current === 0;
  nextBtn.innerText = current === quiz.length - 1 ? "Fine 🎉" : "Avanti ➡";
}

function nextQuestion() {
  if (current < quiz.length - 1) {
    current++;
    loadQuestion();
  } else {
    document.querySelector(".container").innerHTML = `
      <h1>Hai finito! 🎉</h1>
      <p>Bravo, hai completato il quiz 🐴</p>
      <button onclick="location.reload()">Ricomincia</button>
    `;
  }
}

function prevQuestion() {
  if (current > 0) {
    current--;
    loadQuestion();
  }
}

loadQuestion();
</script>

</body>
</html>
